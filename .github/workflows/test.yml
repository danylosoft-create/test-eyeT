name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test || true
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build and deploy dashboard
      - name: Deploy dashboard
        run: |
          # Clone test-eyes for frontend build
          git clone https://github.com/practicajs/test-eyes.git ../test-eyes
          cd ../test-eyes
          git fetch origin feature/architecture-alignment-final
          git checkout feature/architecture-alignment-final || git checkout main || true
          npm install -g pnpm
          pnpm install
          pnpm --filter frontend build
          cd -

          # Get aggregated data from gh-data branch
          git fetch origin gh-data || true
          git checkout gh-data -- data/main-test-data.json || echo "No data yet"

          # Prepare site directory
          mkdir -p _site/data
          cp -r ../test-eyes/apps/frontend/dist/* _site/
          cp data/main-test-data.json _site/data/ || echo "No data file"
          touch _site/.nojekyll

          # Deploy to gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-deploy
          git rm -rf . || true
          cp -r _site/* .
          rm -rf _site
          git add .
          git commit -m "Deploy dashboard"
          git push origin gh-pages-deploy:gh-pages --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
